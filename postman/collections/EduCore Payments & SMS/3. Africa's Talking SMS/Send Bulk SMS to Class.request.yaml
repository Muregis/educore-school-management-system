$kind: http-request
name: Send Bulk SMS to Class
method: POST
url: '{{baseUrl}}/api/communication/sms/bulk'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "className": "all",
      "message": "Dear Parent, this is an important announcement from EduCore School. Please check the school portal for updates. Thank you."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Bulk SMS request accepted", () => {
        // 200 = sent, 404 = no recipients found (no students in DB yet)
        pm.expect([200, 404]).to.include(pm.response.code);
        if (pm.response.code === 404) {
          console.log("No recipients found — make sure students with parent_phone are in the DB.");
        }
      });
      pm.test("Response structure valid", () => {
        const json = pm.response.json();
        if (pm.response.code === 200) {
          pm.expect(json.total).to.be.a("number");
          pm.expect(json.recipients).to.be.an("array");
          console.log(`Bulk SMS — Total: ${json.total}, Sent: ${json.sent}, Failed: ${json.failed}`);
        }
      });
description: |-
  Sends a bulk SMS to all parents of students in a class (or all classes).

  **className options:**
  - `"all"` — sends to all students' parents in the school
  - `"Grade 1"`, `"Form 2"`, etc. — sends to a specific class

  The system fetches all `parent_phone` numbers from the students table and
  sends via Africa's Talking. Each send is logged in `sms_logs`.
