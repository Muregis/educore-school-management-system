services:
  - type: web
    name: educore-api
    runtime: node
    plan: free
    region: frankfurt # Change to your preferred region
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.1
      - key: PORT
        value: 10000 # Default Render port (Local is 4000)
      - key: CORS_ORIGIN
        value: https://educore-school-management-system.vercel.app,https://educore-school-management-system-pi.vercel.app
      - key: JWT_SECRET
        sync: false # Set a strong random secret
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # Payments
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_CALLBACK_BASE_URL
        sync: false # Set to this Render service URL
      # AI & Communication
      - key: GROQ_API_KEY
        sync: false
      - key: WHATSAPP_API_URL
        value: https://graph.facebook.com/v18.0
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
